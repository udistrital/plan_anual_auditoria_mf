<div class="container">
  <div class="row">
    <div class="col-12 my-2">
      <div [innerHTML]="breadcrumb"></div>
    </div>
  </div>
  <mat-card class="p-3">
    <mat-card-content>
      @if (subtitle) {
        <div class="d-flex align-items-center my-1">
          <mat-icon color="primary" style="margin-right: 5px;">calendar_today</mat-icon>
          <b>Vigencia {{ subtitle }}</b>
        </div>
      }
      @if (subtitleChild) {
        <div class="d-flex align-items-center my-1">
          <mat-icon color="primary" style="margin-right: 5px;">bookmark</mat-icon>
          <b>{{ subtitleChild }}</b>
        </div>
      }
      <div class="d-flex justify-content-between align-items-center my-2">
        <h2 style="color: var(--md-primary-700)">{{ title }}</h2>
        @if (mostrarBotonRegresar) {
          <button
            mat-stroked-button
            color="primary"
            style="border: 1px solid var(--md-primary-500)"
            (click)="emitirEventoRegresar()"
            >
            <mat-icon>toll</mat-icon>Regresar
          </button>
        }
      </div>
      <ng-container *ngTemplateOutlet="contenido"></ng-container>
    </mat-card-content>
  </mat-card>
</div>
