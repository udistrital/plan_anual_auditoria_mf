<div class="container">
  <div class="row">
    <div class="col-12 my-2">
      <div [innerHTML]="breadcrumb"></div>
    </div>
  </div>
  <mat-card class="p-3">
    <mat-card-header>
      <mat-card-title>
        <b>{{ title }}</b>
      </mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <!-- Renderiza el template proporcionado -->
      <ng-container *ngTemplateOutlet="contenido"></ng-container>
    </mat-card-content>
  </mat-card>
</div>
