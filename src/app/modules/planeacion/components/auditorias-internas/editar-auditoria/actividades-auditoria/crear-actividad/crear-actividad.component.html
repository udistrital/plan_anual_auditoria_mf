<plantilla-modal
  [icono]="'crear'"
  [titulo]="'Crear Actividad'"
  [descripcion]="'Creación de Actividad'"
  [contenido]="contenidoDeModal"
></plantilla-modal>

<ng-template #contenidoDeModal>
  <app-actividad-formulario
    [minFechaStr]="minFechaStr"
    [maxFechaStr]="maxFechaStr"
    (formSubmit)="crearActividad($event)"
  ></app-actividad-formulario>
</ng-template>
