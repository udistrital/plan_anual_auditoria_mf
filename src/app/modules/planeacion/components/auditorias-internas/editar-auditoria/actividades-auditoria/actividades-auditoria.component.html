<!-- ← Botón de descarga de plantilla de cargue masivo -->
<div class="mb-3">
  <button mat-raised-button color="primary" (click)="descargarPlantilla()">
    <mat-icon svgIcon="excel"></mat-icon>Descargar Plantilla
  </button>
</div>

<h3 class="mt-5 mb-3">Lista de actividades</h3>
<div class="tabla-container">
  <table mat-table [dataSource]="datos">
    <!-- No. Column -->
    <ng-container matColumnDef="no">
      <th mat-header-cell *matHeaderCellDef class="header"><b>No.</b></th>
      <td mat-cell *matCellDef="let element; let i = index" class="bold-text">
        {{ i + 1 }}
      </td>
    </ng-container>

    <!-- Actividad Column -->
    <ng-container matColumnDef="actividad">
      <th mat-header-cell *matHeaderCellDef class="header"><b>Actividad</b></th>
      <td mat-cell *matCellDef="let element; let i = index">
        {{ element.actividad }}
      </td>
    </ng-container>

    <!-- Fecha Inicio Column -->
    <ng-container matColumnDef="fechaInicio">
      <th mat-header-cell *matHeaderCellDef class="header">
        <b>Fecha Inicio</b>
      </th>
      <td mat-cell *matCellDef="let element; let i = index">
        {{ element.fechaInicio }}
      </td>
    </ng-container>

    <!-- Fecha Fin Column -->
    <ng-container matColumnDef="fechaFin">
      <th mat-header-cell *matHeaderCellDef class="header"><b>Fecha Fin</b></th>
      <td mat-cell *matCellDef="let element; let i = index">
        {{ element.fechaFin }}
      </td>
    </ng-container>

    <!-- Acciones -->

    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef class="header">
        <b>Acciones</b>
      </th>
      <td mat-cell *matCellDef="let element; let i = index">
       
          <button
            mat-icon-button
            [matMenuTriggerFor]="menu"
            color="primary"
          >
            <mat-icon>more_vert</mat-icon>
          </button>
          <mat-menu #menu="matMenu">
            <button mat-menu-item (click)="editarActividad(element)">
              <mat-icon color="primary" >edit</mat-icon> Editar Actividad
            </button>
            <button mat-menu-item (click)="eliminarActividad(element)">
              <mat-icon color="primary" >delete</mat-icon> Eliminar Actividad
            </button>
          </mat-menu>
        
      </td>
    </ng-container>
    

    <tr mat-header-row *matHeaderRowDef="columnsToDisplay"></tr>
    <tr mat-row *matRowDef="let row; columns: columnsToDisplay"></tr>
  </table>
</div>
