<mat-card
  *ngFor="let documento of documentos; let i = index"
  class="documento-card"
>
  <div class="documento-content">
    <span class="mb-md">{{ documento.nombre }}</span>
    <div class="icon-buttons">
      <!-- Botón para seleccionar archivo -->
      <button
        mat-icon-button
        color="primary"
        (click)="subirCompromisoEtico()"
        *ngIf="!soloLectura && !documento.plantilla && documento.nombre == 'Compromiso Ético' && base64CompromisoEtico === null"
        class="width-100-md"
      >
        <mat-icon>upload</mat-icon>
      </button>
      <button
        mat-icon-button
        color="primary"
        (click)="verCompromisoEtico()"
        *ngIf="!documento.plantilla && documento.nombre == 'Compromiso Ético' && base64CompromisoEtico !== null"
        class="width-100-md"
      >
        <mat-icon>visibility</mat-icon>
      </button>

      <button
        mat-stroked-button
        *ngIf="documento.plantilla && (!soloLectura || existeDocumento(documento))"
        class="width-100-md"
        (click)="manejarDocumento(documento)"
        matTooltip="En esta opción, puede revisar los cambios realizados. Si todo
        está correcto, puede proceder a guardar el documento."
        [matTooltipPosition]="'above'"
      >
        <mat-icon style="color: var(--md-warning-600)">picture_as_pdf</mat-icon>
        {{
          existeDocumento(documento)
            ? (esCartaRepresentacion(documento) ? "Ver documentos" : "Ver documento")
            : (esCartaRepresentacion(documento) ? "Generar documentos" : "Generar documento")
        }}
      </button>
    </div>
  </div>
</mat-card>
