<plantilla-modal
  [icono]="'list_alt'"
  [titulo]="titulo"
  [descripcion]="descripcion"
  [contenido]="contenidoDeModal"
  [footer]="footerDeModal"
></plantilla-modal>

<ng-template #contenidoDeModal>
  <app-pdf-visualizador [base64Document]="base64"></app-pdf-visualizador>
</ng-template>
<ng-template #footerDeModal>
  @if (!soloLectura) {
    <button mat-raised-button color="primary" (click)="actualizarDocumento()">
      <mat-icon>file_upload</mat-icon>
      Actualizar
    </button>
  }
</ng-template>
