<div class="row mt-4">
  <div class="col-12">
    <p class="mb-2 mx-2">
      Seleccione la auditoría interna para realizar la revisión y/o ejecución.
    </p>
  </div>
  <div class="col-12">
    <table mat-table [dataSource]="auditorias" matSort>
      <ng-container
        *ngFor="let columna of auditoriasContructorTabla"
        [matColumnDef]="columna.columnDef"
      >
        <th mat-header-cell *matHeaderCellDef>
          <ng-container *ngIf="columna.sortable; else noSort">
            <div mat-sort-header>
              <b>{{ columna.header }}</b>
            </div>
          </ng-container>
          <ng-template #noSort>
            <b>{{ columna.header }}</b>
          </ng-template>
        </th>

        <td
          mat-cell
          *matCellDef="let row; let i = index"
          [ngClass]="{ 'even-row': i % 2 === 0 }"
        >
          <ng-container
            *ngTemplateOutlet="
              cellTemplate;
              context: { $implicit: columna, row: row }
            "
          ></ng-container>
        </td>
        <ng-template #cellTemplate let-columna let-row="row">
          <ng-container [ngSwitch]="columna.columnDef">
            <div *ngSwitchCase="'acciones'">
              <button mat-icon-button [matMenuTriggerFor]="menu" color="accent">
                <mat-icon>more_vert</mat-icon>
              </button>
              <mat-menu #menu="matMenu">
                <button mat-menu-item>Ver auditoría</button>
                <button mat-menu-item>Editar auditoría</button>
              </mat-menu>
            </div>
            <div *ngSwitchCase="'documentos'">
              <mat-icon color="accent">description</mat-icon>
            </div>
            <span *ngSwitchDefault>{{ columna.cell(row) }}</span>
          </ng-container>
        </ng-template>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="tablaColumnas"></tr>
      <tr mat-row *matRowDef="let row; columns: tablaColumnas"></tr>
    </table>
    <mat-paginator
      #paginator
      class="mt-3"
      [pageSizeOptions]="[5, 10, 20]"
      showFirstLastButtons
    ></mat-paginator>
  </div>
</div>
