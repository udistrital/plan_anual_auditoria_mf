<plantilla-modal
  [icono]="'play_arrow'"
  [titulo]="'Iniciar Ejecución'"
  [descripcion]="'Adjuntar Acta de Aprobación'"
  [contenido]="contenidoDeModal"
></plantilla-modal>

<ng-template #contenidoDeModal>
  <div class="row">
    <div class="col-12">

      <div class="d-flex justify-content-center align-items-center fondo-acento-50 mt-4">
        <mat-icon>info</mat-icon>
        <p class="mx-2">Por favor adjunte el Acta de Aprobación para iniciar la ejecución</p>
      </div>

      <div class="row d-flex align-items-center">
        <mat-form-field appearance="outline" class="col-12 col-md-9 mt-4">
          <mat-icon matPrefix color="primary">attach_file</mat-icon>
          <input
            matInput
            placeholder="Seleccionar archivo"
            [value]="archivo?.name || ''"
            readonly
          />
          <input
            type="file"
            hidden
            #fileInput
            (change)="onArchivoSeleccionado($event)"
            accept="application/pdf"
          />
        </mat-form-field>

        <div class="col-12 col-md-3 d-flex justify-content-center">
          <button
            mat-raised-button
            color="primary"
            class="mb-md btn-icono"
            (click)="onArchivoInputClick()"
          >
            <span class="material-icons btn-icono__icon">search</span>
            Examinar
          </button>
        </div>
      </div>

    </div>
  </div>

  <div class="d-flex justify-content-center mt-2">
    <button mat-stroked-button class="btn-icono" (click)="removerArchivo()">
      <span class="material-icons btn-icono__icon" style="color: var(--md-primary-500)">delete</span>
      Descartar archivo
    </button>
  </div>

  <div class="d-flex justify-content-center align-items-center mt-5 mb-2">
    <mat-icon color="primary">info</mat-icon>
    <p class="mx-2">¿Iniciar ejecución de la auditoría?</p>
  </div>

  <mat-dialog-actions align="center">
    <button
      mat-stroked-button
      color="primary"
      class="mb-md btn-icono"
      style="border: 1px solid var(--md-primary-500)"
      [mat-dialog-close]
    >
      <span class="material-icons btn-icono__icon">close</span>
      No, cerrar
    </button>

    <button
      mat-raised-button
      color="primary"
      class="mb-md btn-icono"
      (click)="cargarArchivo()"
    >
      <span class="material-icons btn-icono__icon">play_arrow</span>
      Sí, iniciar
    </button>
  </mat-dialog-actions>
</ng-template>
