<plantilla-modal
  [icono]="'editar'"
  [titulo]="'Editar Actividad'"
  [descripcion]="'Edición de Actividad'"
  [contenido]="contenidoDeModal"
></plantilla-modal>

<ng-template #contenidoDeModal>
  <app-actividad-seguimiento-formulario
  [actividadData]="actividadData"
  [minFechaStr]="minFechaStr"
  [maxFechaStr]="maxFechaStr"
  (formSubmit)="editarActividad($event)"
></app-actividad-seguimiento-formulario>
</ng-template>
