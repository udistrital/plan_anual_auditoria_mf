<mat-card [style.width.%]="100">
  <div class="container-principal">
    <h3>Gestión Auditoría >> Registrar Plan Anual Auditoría PAA</h3>
    <h2 class="title">Registrar Auditorías</h2>
    <mat-divider class="divider"></mat-divider>

    <div class="header-row">
      <div class="filter-section">
          <label for="select" class="label-select">Ordenado por: </label>
          <mat-form-field appearance="outline">
              <mat-label >Seleccion </mat-label>
              <mat-select id="select">
                  <mat-option value="opcion1">Opción 1</mat-option>
              </mat-select>
          </mat-form-field>
      </div>
      <button mat-icon-button >
          <mat-icon color="primary" class="icon">view_list</mat-icon>
        </button>
  </div>
  
    <!-- Agregar cdkDropList a la tabla -->
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8 centered-table" cdkDropList (cdkDropListDropped)="drop($event)">
      
      <!-- No Column (Generado automáticamente) -->
      <ng-container matColumnDef="no">
        <th mat-header-cell *matHeaderCellDef class="header">No.</th>
        <td mat-cell *matCellDef="let element;  let i = index" class="cell">{{i + 1}}</td>
      </ng-container>
      
      <!-- Auditoría Column -->
      <ng-container matColumnDef="auditoria">
        <th mat-header-cell *matHeaderCellDef class="header"> Auditoría </th>
        <td mat-cell *matCellDef="let element" class="cell" > {{element.auditoria}} </td>
      </ng-container>

      <!-- Tipo Evaluación Column -->
      <ng-container matColumnDef="tipoEvaluacion">
        <th mat-header-cell *matHeaderCellDef class="header"> Tipo de Evaluación </th>
        <td mat-cell *matCellDef="let element" class="cell" > {{element.tipoEvaluacion}} </td>
      </ng-container>

      <!-- Cronograma Column -->
      <ng-container matColumnDef="cronograma">
        <th mat-header-cell *matHeaderCellDef class="header"> Cronograma </th>
        <td mat-cell *matCellDef="let element" class="cell" > {{element.cronograma}} </td>
      </ng-container>

      <!-- Estado Column -->
      <ng-container matColumnDef="estado">
        <th mat-header-cell *matHeaderCellDef class="header"> Estado </th>
        <td mat-cell *matCellDef="let element" class="cell" > {{element.estado}} </td>
      </ng-container>

      <!-- Acciones Column -->
      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef class="header">Acciones</th>
        <td mat-cell *matCellDef="let element, let i = index" class="cell">
            <mat-menu #menu="matMenu">
                <button mat-menu-item (click)="editAuditoria(i)">
                    <mat-icon color="primary">edit</mat-icon> Editar Auditoría
                </button>
                <button mat-menu-item (click)="EliminarAuditoria(element)">
                    <mat-icon color="grey" >delete</mat-icon> Eliminar Auditoría
                </button>
            </mat-menu>
            <button mat-icon-button [matMenuTriggerFor]="menu">
                <mat-icon>more_vert</mat-icon>
            </button>
        </td>
    </ng-container>


      <!-- Definir las filas (Agregar cdkDrag a las filas) -->
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" cdkDrag></tr>
      
    </table>

  
    <div class="button-container">
      <button  mat-raised-button color="primary" (click)="addAuditoria()">Añadir Auditoría</button>
      <button  mat-raised-button color="primary">Cargue Masivo</button>
      <button  mat-raised-button color="primary"><mat-icon>visibility</mat-icon>ver</button>
      <button  mat-raised-button color="primary" (click)="subirArchivo()"><mat-icon>file_upload</mat-icon>Matriz</button>
      <button  mat-raised-button color="primary" (click)="GuardarPaa()">Guardar</button>
    </div>
  </div>
</mat-card>
