<div *ngIf="hallazgos.length === 0"
  class="d-flex justify-content-center align-items-center py-4" style="width: 100%;">
  <p class="mb-0 text-muted">No hay hallazgos registrados.</p>
</div>

<div *ngIf="hallazgos.length > 0" class="table-container">
  <table mat-table [dataSource]="hallazgos" style="width: 100%;">

    <!-- Número Column -->
    <ng-container matColumnDef="numero">
      <th mat-header-cell *matHeaderCellDef class="header"><b>N°</b></th>
      <td mat-cell *matCellDef="let element" class="cell">{{ element.numero }}</td>
    </ng-container>

    <!-- Criterio Column -->
    <ng-container matColumnDef="criterio">
      <th mat-header-cell *matHeaderCellDef class="header"><b>Criterio</b></th>
      <td mat-cell *matCellDef="let element" class="cell">{{ element.criterio }}</td>
    </ng-container>

    <!-- Descripción Column -->
    <ng-container matColumnDef="descripcion">
      <th mat-header-cell *matHeaderCellDef class="header"><b>Descripción del Hallazgo</b></th>
      <td mat-cell *matCellDef="let element" class="cell">{{ element.descripcion }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
