<mat-card class="custom-card">
  <mat-card-header>
    <mat-card-title>Aprobación plan anual Auditoría</mat-card-title>
  </mat-card-header>
  <mat-divider class="divider"></mat-divider>

  <div id="descargarBtn">
    <button  mat-button color="primary">
      Descargar Todo <mat-icon> insert_drive_file</mat-icon>
    </button>
  </div>

  <mat-card-content>
    <mat-grid-list cols="7" rowHeight="500px" gutterSize="0" class="grid">
        <mat-grid-tile colspan="1" style="display: flex; flex-direction: column; align-items: flex-start; justify-content: flex-start;">
          <mat-nav-list>
            <mat-list-item class="btn-cont ">
                <button mat-button color="primary"
                [ngClass]="{'selected': botonSeleccionado === 'formato'}"
                (click)="seleccionarBoton('formato')"
                >Formato PAA</button>
            </mat-list-item>
            <mat-list-item  class="btn-cont">
                <button mat-button color="primary"
                [ngClass]="{'selected': botonSeleccionado === 'matriz'}"
                (click)="seleccionarBoton('matriz')"
                >Matriz Función Pública</button>
            </mat-list-item>
          </mat-nav-list>
        </mat-grid-tile>

      <!-- Segunda columna para el visualizador de PDF -->
      <mat-grid-tile colspan="6" class="object-render">
        <app-pdf-visualizador [base64Document]="documento" width="100%" height="400px"></app-pdf-visualizador>  
      </mat-grid-tile>
    </mat-grid-list>

    <div class="button_down">
      <button mat-raised-button color="primary">Rechazar Plan</button>
      <button mat-raised-button color="primary">Aprobar y Enviar a Secretario</button>
    </div>
  </mat-card-content>
</mat-card>
