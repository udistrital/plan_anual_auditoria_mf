<plantilla-modal
  [icono]="'file_copy'"
  [titulo]="'Adjuntar archivo'"
  [descripcion]="'Adjuntar Acta de CCCI'"
  [contenido]="contenidoDeModal"
></plantilla-modal>

<ng-template #contenidoDeModal>
  <div class="row">
    <div class="col-12">
      <div
        class="d-flex justify-content-center align-items-center fondo-acento-50 mt-4"
      >
        <mat-icon> info </mat-icon>
        <p class="mx-2">Por favor adjuntar Acta de CCCI para la aprobación</p>
      </div>
      <div class="row d-flex align-items-center">
        <mat-form-field
          class="full-width"
          appearance="outline"
          class="col-9 mt-4"
        >
          <mat-icon matPrefix color="primary">attach_file</mat-icon>
          <input
            matInput
            placeholder="Seleccionar archivo"
            [value]="archivo?.name"
            readonly
          />
          <input
            type="file"
            hidden
            #fileInput
            (change)="onFileSelected($event)"
            accept="pdf"
          />
        </mat-form-field>
        <div class="col-3">
          <button
            mat-raised-button
            color="primary"
            (click)="onFileInputClick()"
          >
            <mat-icon>search</mat-icon>
            Examinar
          </button>
        </div>
      </div>
    </div>
  </div>
  <div class="d-flex justify-content-center">
    <button class="remover" mat-stroked-button (click)="removerArchivo()">
      <mat-icon color="primary">delete</mat-icon>
      Descartar archivo
    </button>
  </div>
  <div class="d-flex justify-content-center align-items-center mt-5 mb-2">
    <mat-icon color="primary"> info </mat-icon>
    <p class="mx-2">¿Aprobar Plan Anual de Auditoría?</p>
  </div>

  <mat-dialog-actions align="center">
    <button
      mat-stroked-button
      color="primary"
      style="border: 1px solid var(--md-primary-500)"
      [mat-dialog-close]
    >
      <mat-icon>close</mat-icon>No, cerrar
    </button>
    <button mat-raised-button color="primary" (click)="cargarArchivo()">
      <mat-icon>cloud_upload</mat-icon>
      Si, aprobar
    </button>
  </mat-dialog-actions>
</ng-template>
