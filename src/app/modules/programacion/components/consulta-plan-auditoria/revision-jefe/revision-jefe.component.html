<plantilla-tarjeta-contenedora
  [title]="'Aprobación Plan Anual de Auditoría'"
  [breadcrumb]="
    '<p>Gestión Auditoría / Programación / Plan Anual de Auditorías / <b>Revisión</b></p>'
  "
  [contenido]="contenidoDePlantilla"
  (regresar)="regresarRuta()"
  [mostrarBotonRegresar]="true"
></plantilla-tarjeta-contenedora>

<ng-template #contenidoDePlantilla>
  <div class="row mt-3">
    <div class="col-12">
      <div class="d-flex flex-row-reverse my-2">
        <button mat-flat-button color="primary" (click)="descargarTodo()">
          Descargar Todo <mat-icon> insert_drive_file</mat-icon>
        </button>
        <ng-container *ngIf="tabs && tabs[selectedTab] && tabs[selectedTab].botones">
          <button
            class="mx-2"
            *ngFor="let boton of tabs[selectedTab].botones"
            mat-flat-button [color]="boton.color || 'accent'"
            (click)="boton.accion()"
          >
            {{ boton.nombre }} <mat-icon *ngIf="boton.icono">{{ boton.icono }}</mat-icon>
          </button>
        </ng-container>
      </div>
      <div class="row">
        <div class="col-sm-12 col-md-4 col-lg-3">
          <div class="d-flex flex-column">
            <button
              *ngFor="let tab of tabs; let i = index"
              class="mb-2"
              mat-stroked-button
              [ngClass]="selectedTab === i ? 'selected' : ''"
              (click)="selectTab(i)"
            >
              {{tab.nombre}}
            </button>
          </div>
        </div>
        <div class="col-sm-12 col-md-8 col-lg-9">
          <div>
            <div *ngFor="let tab of tabs; let i = index">
              <div *ngIf="selectedTab === i">
                <div class="row">
                  <div class="col-12">
                    <div style="border: 1px solid #ebdddd">
                      <app-pdf-visualizador
                        [base64Document]="documentosPorTab[i]"
                      ></app-pdf-visualizador>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <mat-dialog-actions align="center" *ngIf="mostrarBotones">
        <div class="row">
          <div class="col-12 my-4">
            <button
              (click)="abrirModalRechazo()"
              mat-stroked-button
              color="primary"
              class="mx-2"
              style="border: 1px solid var(--md-primary-500)"
            >
              <mat-icon>cancel</mat-icon>Rechazar plan
            </button>
            <button
              class="mx-2"
              mat-raised-button
              color="primary"
              (click)="abrirModalEnviar()"
            >
              <mat-icon>check_circle</mat-icon>
              Aprobar y enviar a Secretario
            </button>
          </div>
        </div>
      </mat-dialog-actions>
    </div>
  </div>
</ng-template>
