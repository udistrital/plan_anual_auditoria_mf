<plantilla-tarjeta-contenedora
  [subtitle] = "vigenciaNombre"
  [title]="'Marco General del Plan Anual de Auditorías'"
  [breadcrumb]="breadcrumb"
  [contenido]="contenidoDePlantilla"
  (regresar)="regresarRuta()"
  [mostrarBotonRegresar]="true"
></plantilla-tarjeta-contenedora>

<ng-template #contenidoDePlantilla>
  <div class="row mt-3">
    <div class="col-12">
      @if (modoEditar) {
        @if (datosCargados) {
          <app-formulario-dinamico
            [formulario]="formulario"
            (submitFormulario)="manejarEnvio($event)"
            />
        }
        <div class="d-flex justify-content-end">
          <div class="button-container">
            <button
              mat-raised-button
              color="primary"
              (click)="guardarInformacion()"
              >
              Guardar
            </button>
          </div>
        </div>
      }
      @if (!modoEditar) {
        <div class="row mt-1">
          @for (item of auditoriaItems; track item) {
            <div class="d-flex align-items-center fondo-chip mb-4">
              <div>
                <mat-icon class="mx-1" color="primary">{{
                  item.icon
                }}</mat-icon>
              </div>
              <div style="color: var(--md-primary-900)" class="mx-2">
                <h3 class="mb-1">{{ item.title }}</h3>
                <p style="white-space: pre-line">{{ item.content }}</p>
              </div>
            </div>
          }
        </div>
      }
    </div>
  </div>
</ng-template>
