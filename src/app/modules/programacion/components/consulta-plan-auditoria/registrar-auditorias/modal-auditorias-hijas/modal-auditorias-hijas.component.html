<plantilla-modal
  [icono]="'warning'"
  [titulo]="'Auditorías hijas activas'"
  [descripcion]="data.hijas.length ? 'La siguiente tabla muestra las auditorías hijas activas asociadas a esta auditoría padre.' : 'Esta auditoría padre no tiene auditorías hijas activas asociadas.'"
  [contenido]="contenidoDeModal"
></plantilla-modal>

<ng-template #contenidoDeModal>
  <div *ngIf="data.hijas.length" class="table-container rounded-table table-scroll">
    <table mat-table [dataSource]="dataSource">
      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef class="header"><b>Nombre</b></th>
        <td mat-cell *matCellDef="let element; let i = index" [ngClass]="{ 'even-row': i % 2 === 0 }">
          {{ element.nombre }}
        </td>
      </ng-container>

      <ng-container matColumnDef="estado">
        <th mat-header-cell *matHeaderCellDef class="header"><b>Estado</b></th>
        <td mat-cell *matCellDef="let element; let i = index" [ngClass]="{ 'even-row': i % 2 === 0 }">
          {{ element.estado }}
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>

  <div class="d-flex justify-content-center align-items-center fondo-acento-50 mb-2 mt-4">
    <mat-icon>info</mat-icon>
    <p class="mx-2">
      ¿Está seguro(a) de {{ data.accion === 'eliminar' ? 'eliminar' : 'editar' }} esta auditoría padre?
    </p>
  </div>

  <mat-dialog-actions align="center">
    <button mat-stroked-button color="primary" (click)="cancelar()" class="mb-sm">
      <mat-icon>close</mat-icon> No, cancelar
    </button>
    <button mat-raised-button color="primary" (click)="confirmar()" class="mb-sm">
      <mat-icon>check</mat-icon> Sí, {{ data.accion === 'eliminar' ? 'eliminar' : 'continuar' }}
    </button>
  </mat-dialog-actions>
</ng-template>
