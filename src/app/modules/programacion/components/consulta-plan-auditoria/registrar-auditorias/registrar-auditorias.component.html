<plantilla-tarjeta-contenedora
  [title]="'Registrar plan anual auditoría - PAA'"
  [breadcrumb]="
    '<p>Gestión Auditoría / Programación / Plan anual de auditorías / <b>Registrar</b></p>'
  "
  [contenido]="contenidoDePlantilla"
  (regresar)="regresarRuta()"
  [mostrarBotonRegresar]="true"
></plantilla-tarjeta-contenedora>

<ng-template #contenidoDePlantilla>
  <div class="row mt-3">
    <div class="col-12">
      <div class="d-flex justify-content-between">
        <div class="filter-section">
          <label for="select" class="label-select">Ordenado por: </label>
          <mat-form-field appearance="outline">
            <mat-label>Selección </mat-label>
            <mat-select id="select">
              <mat-option value="opcion1">Opción 1</mat-option>
            </mat-select>
          </mat-form-field>
        </div>
        <button mat-icon-button>
          <mat-icon color="primary" class="icon">view_list</mat-icon>
        </button>
      </div>

      <!-- Agregar cdkDropList a la tabla -->
      <div class="table-container">
        <table
          mat-table
          [dataSource]="dataSource"
          cdkDropList
          (cdkDropListDropped)="drop($event)"
        >
          <!-- No Column (Generado automáticamente) -->
          <ng-container matColumnDef="no">
            <th mat-header-cell *matHeaderCellDef class="header"><b>No.</b></th>
            <td mat-cell *matCellDef="let element; let i = index" class="cell">
              {{ i + 1 }}
            </td>
          </ng-container>

          <!-- Auditoría Column -->
          <ng-container matColumnDef="auditoria">
            <th mat-header-cell *matHeaderCellDef class="header">
              <b>Auditoría</b>
            </th>
            <td mat-cell *matCellDef="let element" class="cell">
              {{ element.auditoria }}
            </td>
          </ng-container>

          <!-- Tipo Evaluación Column -->
          <ng-container matColumnDef="tipoEvaluacion">
            <th mat-header-cell *matHeaderCellDef class="header">
              <b>Tipo de Evaluación</b>
            </th>
            <td mat-cell *matCellDef="let element" class="cell">
              {{ element.tipoEvaluacion }}
            </td>
          </ng-container>

          <!-- Cronograma Column -->
          <ng-container matColumnDef="cronograma">
            <th mat-header-cell *matHeaderCellDef class="header">
              <b>Cronograma</b>
            </th>
            <td mat-cell *matCellDef="let element" class="cell">
              {{ element.cronograma }}
            </td>
          </ng-container>

          <!-- Estado Column -->
          <ng-container matColumnDef="estado">
            <th mat-header-cell *matHeaderCellDef class="header">
              <b>Estado</b>
            </th>
            <td mat-cell *matCellDef="let element" class="cell">
              {{ element.estado }}
            </td>
          </ng-container>

          <!-- Acciones Column -->
          <ng-container matColumnDef="acciones">
            <th mat-header-cell *matHeaderCellDef class="header">
              <b>Acciones</b>
            </th>
            <td mat-cell *matCellDef="let element; let i = index" class="cell">
              <mat-menu #menu="matMenu">
                <button mat-menu-item (click)="editAuditoria(element)">
                  <mat-icon color="primary">edit</mat-icon> Editar Auditoría
                </button>
                <button mat-menu-item (click)="deleteAuditoria(element)">
                  <mat-icon color="grey">delete</mat-icon> Eliminar Auditoría
                </button>
              </mat-menu>
              <button mat-icon-button [matMenuTriggerFor]="menu">
                <mat-icon>more_vert</mat-icon>
              </button>
            </td>
          </ng-container>

          <!-- Definir las filas (Agregar cdkDrag a las filas) -->
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr
            mat-row
            *matRowDef="let row; columns: displayedColumns"
            cdkDrag
          ></tr>
        </table>
      </div>

      <div class="row mt-3">
        <div class="d-flex justify-content-end">
          <button
            class="mx-2"
            mat-raised-button
            color="primary"
            (click)="addAuditoria()"
          >
            Añadir Auditoría
          </button>
          <button
            class="mx-2"
            mat-raised-button
            color="primary"
            (click)="subirArchivo('xlsx')"
          >
            <mat-icon>file_upload</mat-icon> Cargue Masivo
          </button>
          <button
            class="mx-2"
            mat-raised-button
            color="primary"
            (click)="renderizar()"
          >
            <mat-icon>visibility</mat-icon>ver
          </button>
          <button
            class="mx-2"
            mat-raised-button
            color="primary"
            (click)="subirArchivo('pdf')"
          >
            <mat-icon>file_upload</mat-icon>Matriz
          </button>
          <button
            class="mx-2"
            mat-raised-button
            color="primary"
            (click)="GuardarPaa()"
          >
            Guardar
          </button>
        </div>
      </div>
    </div>
  </div>
</ng-template>
