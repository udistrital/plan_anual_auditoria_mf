<ng-container *ngIf="banderaTabla">
  <div class="row mt-3">
    <h3 class="my-3">Listado de Auditorías Especiales Registradas</h3>
    <div class="col-12">
      <p>
        Seleccione la auditoría especial para modificación o asignación de auditores
      </p>

      <div class="table-container rounded-table table-scroll mt-3">
        <table mat-table [dataSource]="dataSource">
          <ng-container
            *ngFor="let columna of auditoriasContructorTabla"
            [matColumnDef]="columna.columnDef"
          >
            <th mat-header-cell *matHeaderCellDef>
              <b>{{ columna.header }}</b>
            </th>

            <td
              mat-cell
              *matCellDef="let row; let i = index"
              [ngClass]="{ 'even-row': i % 2 === 0 }"
            >
              <ng-container *ngIf="columna.columnDef as colDef" [ngSwitch]="colDef">
                <div *ngSwitchCase="'expandir'">
                  <button
                    *ngIf="esFilaPadre(row)"
                    mat-icon-button
                    color="primary"
                    class="btn-expandir"
                    (click)="alternarAuditoriasConcretas(row)"
                    [attr.aria-label]="auditoriasConcretasVisibles(row) ? 'Colapsar auditorías concretas' : 'Expandir auditorías concretas'"
                  >
                    <mat-icon>
                      {{ auditoriasConcretasVisibles(row) ? 'expand_more' : 'chevron_right' }}
                    </mat-icon>
                  </button>
                </div>
                <div *ngSwitchCase="'numero'">
                  <span class="numero-fila">{{ numeroVisual(row) }}</span>
                </div>

                <div *ngSwitchCase="'acciones'">
                  <ng-container *ngIf="esFilaPadre(row) || row.esAuditoriaConcreta">
                    <button mat-icon-button [matMenuTriggerFor]="menu" color="primary">
                      <mat-icon>more_vert</mat-icon>
                    </button>
                    <mat-menu #menu="matMenu">
                      <ng-container *ngIf="esFilaPadre(row)">
                        <button mat-menu-item (click)="editarAuditoria(row)">
                          <mat-icon color="primary">edit</mat-icon>
                          <span>Editar Auditoría Especial</span>
                        </button>
                        <button mat-menu-item (click)="generarUnaAuditoria(row)">
                          <mat-icon color="primary">add</mat-icon>
                          <span>Generar una Auditoría</span>
                        </button>
                      </ng-container>
                      <ng-container *ngIf="row.esAuditoriaConcreta">
                        <button mat-menu-item (click)="editarAuditoriaConcreta(row)">
                          <mat-icon color="primary">edit</mat-icon>
                          <span>Editar Auditoría Concreta</span>
                        </button>
                        <button mat-menu-item (click)="eliminarAuditoria(row)">
                          <mat-icon color="primary">delete</mat-icon>
                          <span>Eliminar Auditoría Concreta</span>
                        </button>
                      </ng-container>
                    </mat-menu>
                  </ng-container>
                </div>

                <div *ngSwitchDefault>
                  <span>{{ columna.cell(row) }}</span>
                </div>
              </ng-container>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="tablaColumnas"></tr>
          <tr
            mat-row
            *matRowDef="let row; columns: tablaColumnas"
            [ngClass]="{
              'fila-auditoria-padre': esFilaPadre(row),
              'fila-auditoria-concreta': row.esAuditoriaConcreta
            }"
            [style.display]="row.filaOculta ? 'none' : ''"
          ></tr>
        </table>
      </div>
      <mat-paginator
        #paginator
        class="mt-3"
        [length]="totalRegistros"
        [pageSize]="pageSize"
        [pageIndex]="pageIndex"
        (page)="manejarCambioPaginado($event)"
        [pageSizeOptions]="itemsPerPage"
        showFirstLastButtons
      ></mat-paginator>
    </div>
  </div>
</ng-container>
