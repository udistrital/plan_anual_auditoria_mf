<button mat-button class="close-button" (click)="onCancel()">&times;</button>
<h2 class="modal-title">Añadir Auditoría</h2>

<div class="modal-header">
  <button mat-button (click)="onSave()">Guardar y Cerrar</button>
</div>

<form [formGroup]="auditoriaForm" class="form-container">
  <!-- Auditoría -->
  <div class="form-section">
    <div class="section-header">AUDITORÍA</div>
    <mat-form-field appearance="outline" class="form-input">
      <mat-label>Título de la Actividad</mat-label>
      <input matInput formControlName="tituloActividad" placeholder="Título de la Actividad">
      <mat-error
        *ngIf="auditoriaForm.get('tituloActividad').hasError('required') && auditoriaForm.get('tituloActividad').touched">
        El título de la actividad es requerido
      </mat-error>
    </mat-form-field>
  </div>

  <!-- Tipo de Evaluación -->
  <div class="form-section">
    <div class="section-header">TIPO DE EVALUACIÓN</div>
    <mat-form-field appearance="outline" class="form-input">
      <mat-label>Seleccione...</mat-label>
      <mat-select formControlName="tipoEvaluacion">
        <mat-option *ngFor="let evaluacion of evaluaciones" [value]="evaluacion.Id">
          {{ evaluacion.Nombre }}
        </mat-option>
      </mat-select>
      <mat-error
        *ngIf="auditoriaForm.get('tipoEvaluacion').hasError('required') && auditoriaForm.get('tipoEvaluacion').touched">
        Seleccione el tipo de evaluación
      </mat-error>
    </mat-form-field>
  </div>

  <!-- Cronograma de Actividades -->
  <div class="form-section">
    <div class="section-header">CRONOGRAMA DE ACTIVIDADES</div>
    <mat-form-field appearance="outline" class="form-input">
      <mat-label>Seleccione...</mat-label>
      <mat-select formControlName="cronogramaActividades" multiple (selectionChange)="onMesChange()">
        <mat-option (click)="asignarTodos()"  [value]="TODOS">{{ TODOS }}</mat-option>
        <mat-option *ngFor="let mes of meses" [value]="mes.Nombre">{{ mes.Nombre }}</mat-option>
      </mat-select>
      <mat-error
        *ngIf="auditoriaForm.get('cronogramaActividades').hasError('required') && auditoriaForm.get('cronogramaActividades').touched">
        Seleccione al menos un mes para el cronograma
      </mat-error>
    </mat-form-field>
  </div>

</form>

<div class="modal-footer">

</div>
