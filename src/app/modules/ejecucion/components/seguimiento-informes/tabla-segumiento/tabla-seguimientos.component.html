<ng-container *ngIf="banderaTablaSeguimientos">
  <div class="row mt-4">
    <div class="col-12">
      <h3 class="my-3">Lista de seguimientos</h3>
      <p class="mb-2 mx-2">
        Seleccione la auditoría de seguimiento o informe a realizar revisión y/o evaluación.
      </p>
    </div>
    <div class="col-12">
      <div class="table-container rounded-table table-scroll">
        <table mat-table [dataSource]="seguimientosDataSource" matSort>
          <ng-container *ngFor="let columna of seguimientosConstructorTabla" [matColumnDef]="columna.columnDef">
            <th mat-header-cell *matHeaderCellDef mat-sort-header [disabled]="!columna.sortable">
              <b>{{ columna.header }}</b>
            </th>

            <td mat-cell *matCellDef="let row; let i = index" [ngClass]="{ 'even-row': i % 2 === 0 }">
              <ng-container *ngIf="columna.columnDef as colDef" [ngSwitch]="colDef">
                <!-- Columna Número -->
                <div *ngSwitchCase="'numero'">
                  <span>{{ pageIndex * pageSize + i + 1 }}</span>
                </div>

                <!-- Columna Acciones -->
                <div *ngSwitchCase="'acciones'">
                  <button mat-icon-button [matMenuTriggerFor]="menu" color="primary">
                    <mat-icon>more_vert</mat-icon>
                  </button>
                  <mat-menu #menu="matMenu">
                    <ng-container [ngSwitch]="role">
                      <ng-container *ngSwitchCase="'auditor'">
                        <button (click)="editarInformeSeguimiento(row)" mat-menu-item>
                          <mat-icon color="primary">edit</mat-icon> Editar Informe
                        </button>
                        <button mat-menu-item>
                          <mat-icon color="primary">send</mat-icon> Enviar Aprobación Jefe OCI
                        </button>
                      </ng-container>
                      <ng-container *ngSwitchCase="'jefe'">
                        <button mat-menu-item>
                          <mat-icon color="primary">send</mat-icon> Enviar Aprobación Secretario
                        </button>
                      </ng-container>
                      <ng-container *ngSwitchCase="'secretario'">
                        <button mat-menu-item>
                          <mat-icon color="primary">send</mat-icon> Enviar Aprobación Secretario
                        </button>
                      </ng-container>
                    </ng-container>
                  </mat-menu>
                </div>

                <!-- Columna Documentos -->
                <div *ngSwitchCase="'documentos'">
                  <mat-icon (click)="verDocumento(row)" color="primary" class="link">
                    description
                  </mat-icon>
                </div>

                <!-- Resto de columnas -->
                <span *ngSwitchDefault>{{ columna.cell(row) }}</span>
              </ng-container>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="tablaColumnas"></tr>
          <tr mat-row *matRowDef="let row; columns: tablaColumnas"></tr>
          <br />
        </table>
      </div>
      <mat-paginator #paginator class="mt-3" [length]="totalRegistros" [pageSize]="pageSize"
        (page)="manejarCambioPaginado($event)" [pageSizeOptions]="itemsPerPage" showFirstLastButtons></mat-paginator>
    </div>
  </div>
</ng-container>
