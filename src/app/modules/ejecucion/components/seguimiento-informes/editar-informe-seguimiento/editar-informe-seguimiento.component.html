<plantilla-tarjeta-contenedora [breadcrumb]="'<p>Gestión Auditoría / Ejecución / <b>Seguimiento e Informes</b></p>'"
  [contenido]="contenidoDePlantilla" (regresar)="regresarRuta()" [mostrarBotonRegresar]="true">
</plantilla-tarjeta-contenedora>

<ng-template #contenidoDePlantilla>
  <div class="row">
    <div class="col-12">
      <mat-stepper [linear]="esLineal" #stepper labelPosition="bottom" color="primary" [orientation]="orientation">
        <ng-template matStepperIcon="number">
          <mat-icon>lens</mat-icon>
        </ng-template>

        <!-- Paso 1: Información -->
        <mat-step>
          <ng-template matStepLabel>
            <b style="color: var(--primary)">INFORMACIÓN</b>
          </ng-template>
          <div *ngIf="formularioInformacion != null" class="mt-4">
            <app-formulario-dinamico #formularioInformacionComp [formulario]="formularioInformacion"
              (submitFormulario)="preguntarGuardadoInformacion($event)">
            </app-formulario-dinamico>
            <div class="d-flex justify-content-end mt-4">
              <button mat-raised-button color="primary" (click)="enviarFormInformacion()">
                Guardar y Continuar
              </button>
            </div>
          </div>
        </mat-step>

        <!-- Paso 2: Aspectos Generales -->
        <mat-step>
          <ng-template matStepLabel>
            <b style="color: var(--primary)">ASPECTOS GENERALES</b>
          </ng-template>
          <div class="mt-4">
            <h3 class="titulo-seccion">Aspectos Generales</h3>
            <form [formGroup]="formAspectosGenerales" (ngSubmit)="onSubmitAspectosGenerales()">
              <app-editor-enriquecido formControlName="contenido"
                placeholder="Edita tu texto..."></app-editor-enriquecido>
              <div class="d-flex justify-content-end mt-4">
                <button matStepperPrevious mat-stroked-button color="primary" class="me-2">
                  Volver
                </button>
                <button mat-raised-button color="primary" type="submit">
                  Guardar y Continuar
                </button>
              </div>
            </form>
          </div>
        </mat-step>

        <!-- Paso 3: Aspectos Evaluados -->
        <mat-step>
          <ng-template matStepLabel>
            <b style="color: var(--primary)">ASPECTOS EVALUADOS</b>
          </ng-template>
          <div class="mt-4">
            <h3 class="titulo-seccion">Aspectos Evaluados</h3>
            <app-aspectos-evaluados-seguimiento></app-aspectos-evaluados-seguimiento>
            <div class="d-flex justify-content-end mt-4">
              <button mat-stroked-button color="primary" matStepperPrevious class="me-2">
                Volver
              </button>
              <button mat-raised-button color="primary" matStepperNext>
                Guardar y Continuar
              </button>
            </div>
          </div>
        </mat-step>

        <!-- Paso 4: Observaciones y Conclusiones -->
        <mat-step>
          <ng-template matStepLabel>
            <b style="color: var(--primary)">OBSERVACIONES Y CONCLUSIONES</b>
          </ng-template>
          <div class="mt-4">
            <form [formGroup]="formObservaciones" (ngSubmit)="onSubmitObservaciones()">
              <h3 class="titulo-seccion">Observaciones y Conclusiones</h3>
              <app-editor-enriquecido formControlName="observaciones"
                placeholder="Edita tu texto..."></app-editor-enriquecido>

              <h3 class="titulo-seccion mt-4">Notas</h3>
              <app-editor-enriquecido formControlName="notas" placeholder="Edita tu texto..."></app-editor-enriquecido>

              <div class="d-flex justify-content-end mt-4">
                <button matStepperPrevious mat-stroked-button color="primary" class="me-2">
                  Volver
                </button>
                <button mat-stroked-button color="primary" type="button" (click)="verInforme()" class="me-2">
                  <mat-icon>visibility</mat-icon>
                  Ver
                </button>
                <button mat-raised-button color="primary" type="submit" (click)="guardarYCerrar()">
                  Guardar y Cerrar
                </button>
              </div>
            </form>
          </div>
        </mat-step>

      </mat-stepper>
    </div>
  </div>
</ng-template>
