kind: pipeline
name: oas_cliente_ci

steps:
- name: run_sonar_scanner
  image: sonarsource/sonar-scanner-cli:latest
  environment:
    SONAR_HOST_URL:
      from_secret: SONAR_HOST
    SONAR_TOKEN:
      from_secret: SONAR_TOKEN
    SONAR_SCANNER_OPTS: "-Dsonar.working.directory=/tmp/.scannerwork"
  commands:
    - sonar-scanner
  when:
    branch:
      - feature/*
      - develop
      - release/*
      - hotfix/*
      - master
    event:
    - push

- name: check_readme
  image: jjvargass/qa_develoment:latest
  commands:
  - python /app/check_readme.py
  when:
    branch:
    - develop
    - feature/*
    - release/*
    event:
    - push

- name: check_branch
  image: jjvargass/qa_develoment:latest
  commands:
  - python /app/check_branch.py -H ${DRONE_GIT_HTTP_URL}
  when:
    branch:
    - develop
    - feature/*
    - release/*
    event:
    - push

- name: check_commits
  image: jjvargass/qa_develoment:latest
  failure: ignore
  commands:
  - python /app/check_commits.py
  when:
    branch:
    - develop
    - feature/*
    - release/*
    event:
    - push

